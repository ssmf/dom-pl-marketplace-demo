services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
  # image: ghcr.io/waybetterdigital/dom-pl-marketplace-demo-medusa:latest
    build: 
      context: ./backend
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/server
      - /server/node_modules
    networks:
      - medusa_network

  # Nuxt Storefront
  frontend:
  # image: ghcr.io/waybetterdigital/dom-pl-marketplace-demo-frontend:latest
    build:
      context: ./frontend
    container_name: nuxt_frontend
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NUXT_PUBLIC_MEDUSA_BASE_URL=http://localhost:9000
      - NUXT_MEDUSA_BASE_URL=http://medusa:9000
    networks:
      - medusa_network

  minio:
    image: minio/minio:latest
    container_name: medusa_minio
    restart: unless-stopped
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9090:9000"
      - "9091:9001"
    volumes:
      - minio_data:/data
    networks:
      - medusa_network

  minio-init:
    image: minio/mc:latest
    container_name: medusa_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/medusa-bucket --ignore-existing;
      mc anonymous set download local/medusa-bucket;
      exit 0;
      "
    networks:
      - medusa_network

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    networks:
      - medusa_network

volumes:
  postgres_data:
  minio_data:

networks:
  medusa_network:
    driver: bridge
